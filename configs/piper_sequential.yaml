model:
  checkpoint: /data/checkpoints/dynamicvla_merged
  device: cuda
  task: pick up the red plastic bottle
  rotation: euler

cameras:
  opst_cam:
    driver: realsense
    enabled: true
    serial: ""
    width: 640
    height: 480
    fps: 30
  wrist_cam:
    driver: orbbec
    enabled: true
    serial: ""
    width: 640
    height: 480
    fps: 30

robot:
  can_interface: can0
  dh_is_offset: 1
  official_can_adapter: true
  auto_enable: true
  # Fine-tuned labels are physical jaw openings in [0, 0.07] m.
  command_gripper: true
  command_speed_percent: 5
  control_backend: firmware_move_p
  feedback_pose_source: fk
  ik_position_tolerance_m: 10.0
  ik_rotation_tolerance_rad: 10.0
  ik_max_joint_step_deg: 360.0
  ik_min_joint_limit_margin_deg: 0.0
  ik_max_nfev: 60
  ik_allow_pose_projection: true
  ik_projection_joint_limit_margin_deg: 0.0
  ik_projection_max_position_error_m: 10.0
  ik_projection_max_rotation_error_rad: 10.0
  ik_projection_position_weight: 1.0
  ik_projection_rotation_weight: 0.25
  diff_ik_lambda: 0.01
  diff_ik_finite_difference_eps_rad: 0.0001
  diff_ik_position_gain: 1.0
  diff_ik_rotation_gain: 1.0
  pink_urdf_path: /data/repos/DynamicVLA/simulations/robots/PIPER/piper_description.urdf
  pink_frame_name: model_tcp
  pink_parent_frame_name: gripper_base
  pink_solver: proxqp
  pink_dt: 0.04
  pink_position_cost: 1.0
  pink_orientation_cost: 0.25
  pink_posture_cost: 0.01
  pink_lm_damping: 0.0001
  pink_qpsolver_damping: 1.0e-12
  sdk_to_model_translation_m: [0.0, 0.0, 0.1334]
  sdk_to_model_euler_xyz_rad: [0.0, 0.0, 3.141592653589793]

runtime:
  mode: execute
  control_hz: 25.0
  camera_sync_tolerance_ms: 50.0
  sensor_timeout_ms: 250.0
  startup_timeout_s: 300.0
  output_dir: deploy/runs
  history_indices: [-2, 0]
  record_video: true
  video_fps: 25.0
  # Sequential rollout: infer once, execute the trusted prefix, then infer again.
  continuous_inference: false
  max_trusted_action_steps: 20
  # Do not advance until firmware and joint feedback both report completion.
  action_completion_joint_tolerance_deg: 0.5
  action_completion_settle_cycles: 3
  action_completion_timeout_s: 30.0
  max_execute_seconds: 300
  return_to_training_start_on_normal_exit: false
  return_speed_percent: 1
  return_timeout_s: 45

safety:
  workspace_min_m: [0.15, -0.35, 0.05]
  workspace_max_m: [0.60, 0.35, 0.55]
  # All deploy-side motion limits except Piper command speed are disabled.
  enforce_workspace: false
  max_translation_step_m: 10.0
  max_rotation_step_rad: 10.0
  max_action_age_ms: 3600000.0
  stale_action_hold_ms: 3600000.0
  hold_on_stale_action: true
  # Dataset action[6] is absolute jaw opening, not a signed +/-1 command.
  gripper_open_threshold: 0.035
  gripper_min_m: 0.0
  gripper_max_m: 0.07
