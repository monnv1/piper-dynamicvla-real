model:
  checkpoint: /home/yuling/work_space/repos/DynamicVLA/dynamic-vla-DOM
  device: cuda
  task: pick up the red plastic bottle
  rotation: euler

cameras:
  opst_cam:
    driver: realsense
    enabled: true
    serial: ""
    width: 640
    height: 480
    fps: 30
  wrist_cam:
    driver: orbbec
    enabled: true
    serial: ""
    width: 640
    height: 480
    fps: 30

robot:
  can_interface: can0
  dh_is_offset: 1
  official_can_adapter: true
  # This dedicated config permits execute, but CLI --confirm-motion is still required.
  auto_enable: true
  command_gripper: true
  # Lowest accepted Piper percentage for the first test.
  command_speed_percent: 5
  control_backend: host_ik_move_j
  ik_position_tolerance_m: 0.002
  ik_rotation_tolerance_rad: 0.035
  ik_max_joint_step_deg: 5.0
  ik_min_joint_limit_margin_deg: 0.2
  ik_max_nfev: 60
  sdk_to_model_translation_m: [0.0, 0.0, 0.1334]
  sdk_to_model_euler_xyz_rad: [0.0, 0.0, 3.141592653589793]

runtime:
  mode: execute
  control_hz: 25.0
  camera_sync_tolerance_ms: 50.0
  sensor_timeout_ms: 250.0
  startup_timeout_s: 300.0
  output_dir: deploy/runs
  history_indices: [-2, 0]
  # Automatically stop command updates and hold the measured joints.
  max_execute_seconds: 30
  # Only a normal time-limit exit returns to the training start. Errors and
  # Ctrl+C stop at the measured current pose instead of starting new motion.
  return_to_training_start_on_normal_exit: true
  return_speed_percent: 5
  return_timeout_s: 45

safety:
  workspace_min_m: [0.15, -0.35, 0.05]
  workspace_max_m: [0.60, 0.35, 0.55]
  # At 25 Hz these nominally cap target progression at 25 mm/s and 0.25 rad/s.
  max_translation_step_m: 0.01
  max_rotation_step_rad: 0.08
  max_action_age_ms: 800.0
  stale_action_hold_ms: 200.0
  gripper_open_threshold: 0.0
  gripper_min_m: 0.0
  gripper_max_m: 0.07
